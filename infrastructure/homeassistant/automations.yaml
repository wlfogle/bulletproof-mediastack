# ============================================================
# Automations — Alert, Schedule, Self-heal (2026-05-28)
# Sonarr/Radarr removed (stopped CTs; Riven replaces)
# ============================================================

# ── Daily morning briefing at 08:00 ──────────────────────────
- id: daily_morning_report
  alias: "Daily Morning Report"
  trigger:
    - platform: time
      at: "08:00:00"
  action:
    - action: script.morning_routine

# ── Service down — Jellyfin ───────────────────────────────────
- id: alert_jellyfin_down
  alias: "Alert — Jellyfin Down"
  trigger:
    - platform: state
      entity_id: binary_sensor.jellyfin
      to: "off"
      for: "00:02:00"
  action:
    - action: persistent_notification.create
      data:
        title: "🚨 ALERT — Jellyfin Offline"
        message: >
          Jellyfin on CT-300 (192.168.12.30:8096) unreachable for 2 minutes.
          Check: ssh tiamat 'pct exec 300 -- systemctl status jellyfin'

# ── Service down — CT-300 (main stack) ───────────────────────
- id: alert_ct300_down
  alias: "Alert — CT-300 Down"
  trigger:
    - platform: state
      entity_id: binary_sensor.ct300_mediastack
      to: "off"
      for: "00:02:00"
  action:
    - action: persistent_notification.create
      data:
        title: "🚨 ALERT — CT-300 Mediastack Down"
        message: >
          CT-300 (192.168.12.30) unreachable for 2 minutes.
          All services down: Jellyfin, Riven, Threadfin, Caddy.
          Check: ssh tiamat 'pct status 300'

# ── Service down — Riven ──────────────────────────────────────
- id: alert_riven_down
  alias: "Alert — Riven Down"
  trigger:
    - platform: state
      entity_id: sensor.riven_status
      to: "Offline"
      for: "00:03:00"
  action:
    - action: persistent_notification.create
      data:
        title: "⚠️ Riven Offline"
        message: >
          Riven backend (192.168.12.30:8080) unreachable for 3 min.
          Content pipeline paused. Check: ssh tiamat 'pct exec 300 -- systemctl status riven'

# ── Service down — Ollama ─────────────────────────────────────
- id: alert_ollama_down
  alias: "Alert — Ollama Down"
  trigger:
    - platform: state
      entity_id: binary_sensor.ollama
      to: "off"
      for: "00:05:00"
  action:
    - action: persistent_notification.create
      data:
        title: "⚠️ Ollama Offline"
        message: >
          Laptop Ollama (192.168.12.172:11434) unreachable for 5 min.
          AI voice commands will fall back to basic mode.

# ── Service recovers — Jellyfin ───────────────────────────────
- id: alert_jellyfin_recovered
  alias: "Alert — Jellyfin Recovered"
  trigger:
    - platform: state
      entity_id: binary_sensor.jellyfin
      from: "off"
      to: "on"
  action:
    - action: persistent_notification.create
      data:
        title: "✅ Jellyfin Back Online"
        message: "Jellyfin on CT-300 (192.168.12.30:8096) is responding again."

# ── Weekly library scan — Sunday 03:00 ───────────────────────
- id: weekly_library_scan
  alias: "Weekly Library Scan"
  trigger:
    - platform: time
      at: "03:00:00"
  condition:
    - condition: time
      weekday:
        - sun
  action:
    - action: script.media_scan

# ── Threadfin auto-update — daily 04:00 ──────────────────────
- id: daily_threadfin_update
  alias: "Daily Threadfin EPG Update"
  trigger:
    - platform: time
      at: "04:00:00"
  action:
    - action: script.update_live_tv
