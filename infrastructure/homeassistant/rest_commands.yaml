# ============================================================
# REST Commands — CT-300 media stack (2026-05-28)
# All services consolidated in CT-300 (192.168.12.30)
# Sonarr/Radarr/Prowlarr removed (stopped CTs; Riven replaces)
# ============================================================

# ── Jellyfin ──────────────────────────────────────────────────
check_jellyfin:
  url: "http://192.168.12.30:8096/System/Info/Public"
  method: GET
  timeout: 10

jellyfin_library_scan:
  url: "http://192.168.12.30:8096/Library/Refresh"
  method: POST
  headers:
    X-Emby-Token: !secret jellyfin_api_key
  timeout: 30

jellyfin_recent_movies:
  url: "http://192.168.12.30:8096/Items/Latest?IncludeItemTypes=Movie&Limit=5"
  method: GET
  headers:
    X-Emby-Token: !secret jellyfin_api_key
  timeout: 10

jellyfin_recent_shows:
  url: "http://192.168.12.30:8096/Items/Latest?IncludeItemTypes=Episode&Limit=5"
  method: GET
  headers:
    X-Emby-Token: !secret jellyfin_api_key
  timeout: 10

# ── Riven ─────────────────────────────────────────────────────
check_riven:
  url: "http://192.168.12.30:8080/api/v1/health"
  method: GET
  headers:
    Authorization: !secret riven_auth_header
  timeout: 10

riven_get_items:
  url: "http://192.168.12.30:8080/api/v1/items?limit=10&sort=date_desc"
  method: GET
  headers:
    Authorization: !secret riven_auth_header
  timeout: 15

# ── Threadfin IPTV ────────────────────────────────────────────
check_threadfin:
  url: "http://192.168.12.30:34400/api/"
  method: POST
  headers:
    Content-Type: "application/json"
  payload: '{"cmd":"status"}'
  timeout: 10

threadfin_update_m3u:
  url: "http://192.168.12.30:34400/api/"
  method: POST
  headers:
    Content-Type: "application/json"
  payload: '{"cmd":"updateM3U"}'
  timeout: 30

threadfin_update_xmltv:
  url: "http://192.168.12.30:34400/api/"
  method: POST
  headers:
    Content-Type: "application/json"
  payload: '{"cmd":"updateXMLTV"}'
  timeout: 30

threadfin_update_xepg:
  url: "http://192.168.12.30:34400/api/"
  method: POST
  headers:
    Content-Type: "application/json"
  payload: '{"cmd":"updateXEPG"}'
  timeout: 30

# ── n8n local API sidecar ─────────────────────────────────────
check_n8n:
  url: "http://192.168.12.30:5678"
  method: GET
  timeout: 10

n8n_health_check:
  url: "http://192.168.12.30:9876/health"
  method: GET
  timeout: 10

n8n_disk_guard:
  url: "http://192.168.12.30:9876/disk-guard"
  method: GET
  timeout: 15

# ── Uptime Kuma ───────────────────────────────────────────────
check_uptime_kuma:
  url: "http://192.168.12.30:3001"
  method: GET
  timeout: 10

# ── Homarr ────────────────────────────────────────────────────
check_homarr:
  url: "http://192.168.12.30:7575"
  method: GET
  timeout: 10

# ── Unified Guide ─────────────────────────────────────────────
check_unified_guide:
  url: "http://192.168.12.30:7700/"
  method: GET
  timeout: 10

# ── Ollama (laptop) ───────────────────────────────────────────
check_ollama:
  url: "http://192.168.12.172:11434/api/version"
  method: GET
  timeout: 10

ollama_list_models:
  url: "http://192.168.12.172:11434/api/tags"
  method: GET
  timeout: 10

# ── Internet ──────────────────────────────────────────────────
check_internet:
  url: "https://1.1.1.1"
  method: GET
  timeout: 5

# ── CT-300 core ───────────────────────────────────────────────
check_ct300:
  url: "http://192.168.12.30:8096/System/Info/Public"
  method: GET
  timeout: 10
