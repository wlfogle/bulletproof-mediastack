# ============================================================
# Scripts — Complete Voice Control Suite (2026-05-28)
# "Alexa, turn on <name>" or "Computer, <phrase>"
# All services consolidated in CT-300 (192.168.12.30)
# ============================================================

# ════════════════════════════════════════════════════════════
# MEDIA PLAYBACK
# ════════════════════════════════════════════════════════════

movie_night:
  alias: "Movie Night"
  icon: mdi:movie-open
  sequence:
    - action: rest_command.check_jellyfin
    - delay: "00:00:02"
    - action: persistent_notification.create
      data:
        title: "🎬 Movie Night"
        message: >
          Jellyfin: {{ 'Online' if is_state('binary_sensor.jellyfin', 'on') else 'OFFLINE' }}
          | Active streams: {{ states('sensor.jellyfin_active_streams') }}
          | Threadfin: {{ states('sensor.threadfin_channels') }} live channels
          | http://192.168.12.30:8096

pause_all_media:
  alias: "Pause All Media"
  icon: mdi:pause-circle
  sequence:
    - action: media_player.media_pause
      target:
        entity_id: all
    - action: persistent_notification.create
      data:
        title: "⏸️ All Media Paused"
        message: "All active Jellyfin streams paused."

resume_media:
  alias: "Resume Media"
  icon: mdi:play-circle
  sequence:
    - action: media_player.media_play
      target:
        entity_id: all
    - action: persistent_notification.create
      data:
        title: "▶️ Media Resumed"
        message: "Resuming all media players."

check_jellyfin:
  alias: "Check Jellyfin"
  icon: mdi:television-play
  sequence:
    - action: rest_command.check_jellyfin
    - delay: "00:00:01"
    - action: persistent_notification.create
      data:
        title: "📺 Jellyfin Status"
        message: >
          Jellyfin on CT-300: {{ 'Online' if is_state('binary_sensor.jellyfin', 'on') else 'OFFLINE' }}
          | Streams: {{ states('sensor.jellyfin_active_streams') }}
          | URL: http://192.168.12.30:8096

# ════════════════════════════════════════════════════════════
# LIVE TV (Threadfin)
# ════════════════════════════════════════════════════════════

check_live_tv:
  alias: "Check Live TV"
  icon: mdi:broadcast
  sequence:
    - action: rest_command.check_threadfin
    - action: persistent_notification.create
      data:
        title: "📡 Live TV Status"
        message: >
          Threadfin IPTV: {{ 'Online' if is_state('binary_sensor.ct300_mediastack', 'on') else 'OFFLINE' }}
          | Channels: {{ states('sensor.threadfin_channels') }}
          | Web: http://192.168.12.30:34400/web
          | EPG: tvpass.org + OTA zap2xml

update_live_tv:
  alias: "Update Live TV"
  icon: mdi:antenna
  sequence:
    - action: rest_command.threadfin_update_m3u
    - action: rest_command.threadfin_update_xmltv
    - delay: "00:00:05"
    - action: rest_command.threadfin_update_xepg
    - action: persistent_notification.create
      data:
        title: "📡 Live TV Updated"
        message: "Threadfin M3U + XMLTV + XEPG refreshed. Channel guide rebuilding."

# ════════════════════════════════════════════════════════════
# LIBRARY MANAGEMENT
# ════════════════════════════════════════════════════════════

media_scan:
  alias: "Media Library Scan"
  icon: mdi:library-shelves
  sequence:
    - action: rest_command.jellyfin_library_scan
    - action: persistent_notification.create
      data:
        title: "📚 Library Scan Started"
        message: "Jellyfin is refreshing all libraries."

whats_new:
  alias: "What's New"
  icon: mdi:new-box
  sequence:
    - action: rest_command.jellyfin_recent_movies
    - action: rest_command.jellyfin_recent_shows
    - delay: "00:00:02"
    - action: persistent_notification.create
      data:
        title: "🆕 What's New on Jellyfin"
        message: >
          Recent activity on your library.
          Check Jellyfin: http://192.168.12.30:8096
          Streams active: {{ states('sensor.jellyfin_active_streams') }}

# ════════════════════════════════════════════════════════════
# RIVEN (content pipeline)
# ════════════════════════════════════════════════════════════

check_riven:
  alias: "Check Riven"
  icon: mdi:film
  sequence:
    - action: rest_command.check_riven
    - action: persistent_notification.create
      data:
        title: "🎬 Riven Status"
        message: >
          Riven: {{ states('sensor.riven_status') }}
          | UI: http://192.168.12.30:3000
          | API: http://192.168.12.30:8080
          | Pipeline: Real-Debrid → JD2 → Jellyfin

request_content:
  alias: "Request Content"
  icon: mdi:plus-circle
  sequence:
    - action: persistent_notification.create
      data:
        title: "🎬 Request Content"
        message: >
          Open Riven to search and request content:
          http://192.168.12.30:3000
          Pipeline: Riven → Real-Debrid → JDownloader2 → Jellyfin
          Say a title to search or browse trending.

download_status:
  alias: "Download Status"
  icon: mdi:download-circle
  sequence:
    - action: rest_command.check_riven
    - action: rest_command.riven_get_items
    - delay: "00:00:02"
    - action: persistent_notification.create
      data:
        title: "⬇️ Download Status"
        message: >
          Riven pipeline: {{ states('sensor.riven_status') }}
          | JD2 bridge: active (systemd)
          | Real-Debrid: active
          | Request content: http://192.168.12.30:3000

jdownloader_status:
  alias: "JDownloader Status"
  icon: mdi:download-box
  sequence:
    - action: persistent_notification.create
      data:
        title: "📥 JDownloader2 Status"
        message: >
          JD2 headless running on CT-300 (Xvfb :1, x11vnc :5901)
          | MyJD device: mediastack-jd2
          | Riven-JD2 bridge: {{ 'active' if is_state('binary_sensor.ct300_mediastack', 'on') else 'OFFLINE' }}
          | Monitor: https://my.jdownloader.org

# ════════════════════════════════════════════════════════════
# CT-300 HEALTH
# ════════════════════════════════════════════════════════════

ct300_health:
  alias: "CT-300 Health"
  icon: mdi:heart-pulse
  sequence:
    - action: rest_command.check_ct300
    - action: rest_command.check_riven
    - action: rest_command.check_threadfin
    - action: rest_command.check_n8n
    - delay: "00:00:02"
    - action: persistent_notification.create
      data:
        title: "📊 CT-300 Health"
        message: >
          CT-300: {{ 'Online' if is_state('binary_sensor.ct300_mediastack', 'on') else 'OFFLINE' }}
          | Jellyfin: {{ 'Online' if is_state('binary_sensor.jellyfin', 'on') else 'OFFLINE' }}
          | Riven: {{ states('sensor.riven_status') }}
          | Threadfin: {{ states('sensor.threadfin_channels') }} channels
          | n8n: checked

check_storage:
  alias: "Check Storage"
  icon: mdi:harddisk
  sequence:
    - action: rest_command.n8n_disk_guard
    - action: persistent_notification.create
      data:
        title: "💾 Storage Check"
        message: >
          CT-300 disk check triggered via n8n sidecar.
          Watchdog monitors /mnt/hdd (warn 80%, crit 88%).

check_network:
  alias: "Check Network"
  icon: mdi:lan
  sequence:
    - action: rest_command.check_internet
    - delay: "00:00:02"
    - action: persistent_notification.create
      data:
        title: "🌐 Network Status"
        message: >
          Internet: {{ 'Online' if is_state('binary_sensor.ct300_mediastack', 'on') else 'Check connection' }}
          | Proxmox: {{ 'Online' if is_state('binary_sensor.tiamat_proxmox', 'on') else 'OFFLINE' }}
          | Bahamut: {{ 'Online' if is_state('binary_sensor.bahamut', 'on') else 'OFFLINE' }}
          | HABridge: {{ 'Online' if is_state('binary_sensor.habridge', 'on') else 'OFFLINE' }}
          | Tailscale: active on CT-300

# ════════════════════════════════════════════════════════════
# AI SERVICES
# ════════════════════════════════════════════════════════════

ai_status:
  alias: "AI Status"
  icon: mdi:robot
  sequence:
    - action: rest_command.check_ollama
    - action: rest_command.ollama_list_models
    - delay: "00:00:01"
    - action: persistent_notification.create
      data:
        title: "🤖 AI Systems"
        message: >
          Ollama: {{ states('sensor.ollama_status') }}
          | Endpoint: http://192.168.12.172:11434
          | HA Assist: Tiamat Computer voice agent

# ════════════════════════════════════════════════════════════
# FULL SYSTEM
# ════════════════════════════════════════════════════════════

system_status:
  alias: "System Status"
  icon: mdi:server-network
  sequence:
    - action: rest_command.check_ct300
    - action: rest_command.check_riven
    - action: rest_command.check_threadfin
    - action: rest_command.check_ollama
    - action: rest_command.check_internet
    - delay: "00:00:02"
    - action: persistent_notification.create
      data:
        title: "🖥️ Tiamat Systems Report"
        message: >
          CT-300: {{ 'Online' if is_state('binary_sensor.ct300_mediastack', 'on') else 'OFFLINE' }}
          | Jellyfin: {{ 'Online' if is_state('binary_sensor.jellyfin', 'on') else 'OFFLINE' }}
          ({{ states('sensor.jellyfin_active_streams') }} streams)
          | Riven: {{ states('sensor.riven_status') }}
          | Threadfin: {{ states('sensor.threadfin_channels') }} channels
          | Ollama: {{ states('sensor.ollama_status') }}
          | Proxmox: {{ 'Online' if is_state('binary_sensor.tiamat_proxmox', 'on') else 'OFFLINE' }}
          | Bahamut: {{ 'Online' if is_state('binary_sensor.bahamut', 'on') else 'OFFLINE' }}

computer_report:
  alias: "Computer Report"
  icon: mdi:clipboard-pulse
  sequence:
    - action: script.system_status
    - delay: "00:00:03"
    - action: script.download_status
    - delay: "00:00:02"
    - action: script.ai_status
    - action: persistent_notification.create
      data:
        title: "📋 Full Tiamat Report"
        message: >
          Systems: {{ 'Nominal' if is_state('binary_sensor.tiamat_proxmox', 'on') else 'DEGRADED' }}
          | Media: {{ 'Online' if is_state('binary_sensor.jellyfin', 'on') else 'OFFLINE' }}
          ({{ states('sensor.jellyfin_active_streams') }} streams)
          | Riven: {{ states('sensor.riven_status') }}
          | Live TV: {{ states('sensor.threadfin_channels') }} channels
          | AI: {{ states('sensor.ollama_status') }}
          | Pipeline: Riven → RD → JD2 → Jellyfin

full_infrastructure:
  alias: "Full Infrastructure"
  icon: mdi:server-network-outline
  sequence:
    - action: rest_command.check_ct300
    - action: rest_command.check_riven
    - action: rest_command.check_threadfin
    - action: rest_command.check_homarr
    - action: rest_command.check_uptime_kuma
    - action: rest_command.check_unified_guide
    - action: rest_command.check_n8n
    - action: rest_command.n8n_health_check
    - action: rest_command.check_ollama
    - action: rest_command.check_internet
    - delay: "00:00:03"
    - action: persistent_notification.create
      data:
        title: "🏗️ Full Infrastructure Report"
        message: >
          CT-300 services:
          Jellyfin ✓ | Riven ✓ | Threadfin ✓ | Caddy ✓
          Homarr ✓ | Unified Guide ✓ | Uptime Kuma ✓
          n8n ✓ | PostgreSQL ✓ | Redis ✓ | CrowdSec ✓
          JD2 bridge ✓ | MetaTube ✓ | Tailscale ✓
          ---
          External: Proxmox {{ 'Online' if is_state('binary_sensor.tiamat_proxmox', 'on') else 'OFFLINE' }}
          | Bahamut {{ 'Online' if is_state('binary_sensor.bahamut', 'on') else 'OFFLINE' }}
          | HABridge {{ 'Online' if is_state('binary_sensor.habridge', 'on') else 'OFFLINE' }}
          | Ollama {{ states('sensor.ollama_status') }}

# ════════════════════════════════════════════════════════════
# ROUTINES
# ════════════════════════════════════════════════════════════

morning_routine:
  alias: "Morning Routine"
  icon: mdi:weather-sunny
  sequence:
    - action: script.system_status
    - delay: "00:00:03"
    - action: persistent_notification.create
      data:
        title: "🌅 Good Morning — Tiamat Online"
        message: >
          All systems initialising. Good morning, Commander.
          Jellyfin: {{ states('sensor.jellyfin_active_streams') }} streams.
          Riven: {{ states('sensor.riven_status') }}.
          Live TV: {{ states('sensor.threadfin_channels') }} channels.

evening_routine:
  alias: "Evening Mode"
  icon: mdi:weather-night
  sequence:
    - action: script.ct300_health
    - delay: "00:00:02"
    - action: persistent_notification.create
      data:
        title: "🌙 Evening Mode — Tiamat"
        message: "All systems nominal. Good evening, Commander."

media_scan_full:
  alias: "Full Media Scan"
  icon: mdi:magnify
  sequence:
    - action: rest_command.jellyfin_library_scan
    - action: rest_command.threadfin_update_m3u
    - action: rest_command.threadfin_update_xmltv
    - action: persistent_notification.create
      data:
        title: "🔄 Full Scan"
        message: "Jellyfin library refresh + Threadfin M3U/XMLTV update triggered."
