# ============================================================
# Sensors — CT-300 media stack (2026-05-28)
# Sonarr/Radarr removed (stopped CTs; Riven replaces them)
# ============================================================

# ── System monitoring (command_line) ──────────────────────────
- platform: command_line
  name: "HA CPU Usage"
  command: "cat /proc/loadavg | awk '{print $1}'"
  unit_of_measurement: "load"
  scan_interval: 30

- platform: command_line
  name: "HA Memory Used"
  command: "free -m | awk '/Mem:/ {printf \"%.0f\", $3/$2*100}'"
  unit_of_measurement: "%"
  scan_interval: 60

- platform: command_line
  name: "HA Disk Used"
  command: "df /config | awk 'NR==2 {print $5}' | tr -d '%'"
  unit_of_measurement: "%"
  scan_interval: 300

# ── Jellyfin active streams ───────────────────────────────────
- platform: rest
  name: "Jellyfin Active Streams"
  resource: "http://192.168.12.30:8096/Sessions"
  headers:
    X-Emby-Token: !secret jellyfin_api_key
  value_template: >
    {% if value_json is iterable %}
      {{ value_json | selectattr('NowPlayingItem', 'defined') | list | count }}
    {% else %}
      0
    {% endif %}
  unit_of_measurement: "streams"
  scan_interval: 30

# ── Riven backend health ──────────────────────────────────────
- platform: rest
  name: "Riven Status"
  resource: "http://192.168.12.30:8080/api/v1/health"
  headers:
    Authorization: !secret riven_auth_header
  method: GET
  value_template: >
    {% if value_json is defined and value_json %}
      Online
    {% else %}
      Offline
    {% endif %}
  scan_interval: 60

# ── Threadfin channel count ───────────────────────────────────
- platform: rest
  name: "Threadfin Channels"
  resource: "http://192.168.12.30:34400/api/"
  method: POST
  headers:
    Content-Type: "application/json"
  payload: '{"cmd":"status"}'
  value_template: >
    {% if value_json is defined and value_json['streams.all'] is defined %}
      {{ value_json['streams.all'] }}
    {% else %}
      0
    {% endif %}
  unit_of_measurement: "channels"
  scan_interval: 300

# ── Ollama status ─────────────────────────────────────────────
- platform: rest
  name: "Ollama Status"
  resource: "http://192.168.12.172:11434/api/version"
  method: GET
  value_template: >
    {% if value_json.version is defined %}
      Online v{{ value_json.version }}
    {% else %}
      Offline
    {% endif %}
  scan_interval: 60
