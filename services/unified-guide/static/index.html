<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Unified Guide — Tiamat</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <h1>📺 Unified Guide</h1>
    <div class="meta">
      <span id="generated">…</span>
      <span class="counts" id="counts"></span>
      <button id="refresh" type="button">↻ Refresh</button>
    </div>
    <nav class="filters">
      <label><input type="checkbox" data-source="ota"   checked> OTA</label>
      <label><input type="checkbox" data-source="iptv"  checked> IPTV</label>
      <label><input type="checkbox" data-source="yttv"  checked> YouTube TV</label>
      <label><input type="checkbox" data-source="svod"  checked> SVOD</label>
      <label><input type="checkbox" data-source="local" checked> Library</label>
      <input type="search" id="search" placeholder="filter title…">
    </nav>
  </header>

  <main id="grid"><p class="empty">Loading…</p></main>

  <footer>
    <small>
      Click a tile → it launches the right app. SVOD opens vendor app/site;
      OTA/IPTV opens Jellyfin Live TV; YouTube TV opens tv.youtube.com tuned to
      that channel; Library opens Jellyfin item.
    </small>
  </footer>

  <script src="/static/app.js" defer></script>
</body>
</html>
